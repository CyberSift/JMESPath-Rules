name: Update Rules Catalog

on:
  push:
    paths:
      - 'rules/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate rules.json
        run: |
          python3 .github/scripts/generate_rules.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'Auto-update rules catalog from detection rules'
          title: 'chore: update rules catalog'
          body: 'Automatically generated rules catalog from rule files'
          branch: 'auto-update-rules'
          delete-branch: true
