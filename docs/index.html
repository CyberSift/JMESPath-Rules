<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMESPath Rules Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Roboto+Slab:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colours */
            --cs-red:        #E82A37;
            --cs-dark-red:   #C4232E;
            --cs-deep-red:   #9C1C25;
            --cs-charcoal:   #1C1F23;
            --cs-near-black: #231F20;
            --cs-mid-grey:   #A9B2B9;
            --cs-gold:       #ECB227;
            --cs-teal:       #0F9D9A;
            --cs-blue:       #0178B3;
            --cs-white:      #FFFFFF;
            --cs-surface:    #F5F6F7;

            /* Typography */
            --font-display: 'Outfit', Arial, sans-serif;
            --font-serif:   'Roboto Slab', Georgia, serif;

            /* Spacing */
            --section-pad: 3rem 4rem;
            --card-radius: 4px;

            /* Type scale */
            --type-eyebrow: 0.75rem;
            --type-h1: 2.5rem;
            --type-h2: 1.5rem;
            --type-h3: 1rem;
            --type-body: 0.9375rem;
            --type-small: 0.8125rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-display);
            background: var(--cs-surface);
            color: var(--cs-charcoal);
            min-height: 100vh;
            font-size: var(--type-body);
            line-height: calc(var(--type-body) + 2pt);
        }

        /* ── Cover Band ── */
        .cover {
            background: var(--cs-charcoal);
            color: var(--cs-white);
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-bottom: 4px solid var(--cs-red);
        }

        .cover__top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .cover__brand {
            font-family: var(--font-serif);
            font-size: var(--type-eyebrow);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--cs-red);
        }

        .cover__date {
            font-family: var(--font-display);
            font-size: var(--type-small);
            color: var(--cs-mid-grey);
        }

        .cover__content {
            margin-top: 1rem;
        }

        .cover h1 {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: var(--type-h1);
            color: var(--cs-white);
            margin: 0.5rem 0;
            line-height: 1.15;
        }

        .cover__sub {
            font-family: var(--font-display);
            font-size: var(--type-body);
            color: var(--cs-mid-grey);
        }

        .cover__footer {
            font-family: var(--font-display);
            font-size: 0.75rem;
            color: var(--cs-mid-grey);
            margin-top: 2rem;
        }

        /* ── Container ── */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 4rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        /* ── Sidebar ── */
        .sidebar {
            background: var(--cs-white);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            height: fit-content;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-left: 4px solid var(--cs-red);
        }

        .sidebar h3 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: var(--type-h3);
            color: var(--cs-charcoal);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--cs-red);
            padding-bottom: 0.5rem;
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-family: var(--font-serif);
            font-size: var(--type-eyebrow);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--cs-charcoal);
            display: block;
            margin-bottom: 0.75rem;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--cs-mid-grey);
            border-radius: var(--card-radius);
            font-family: var(--font-display);
            font-size: var(--type-small);
            color: var(--cs-charcoal);
            background: var(--cs-white);
            margin-bottom: 0.5rem;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--cs-red);
        }

        .filter-options {
            max-height: 200px;
            overflow-y: auto;
        }

        .filter-checkbox {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .filter-checkbox input[type="checkbox"] {
            width: auto;
            margin-right: 0.5rem;
            cursor: pointer;
        }

        .filter-checkbox label {
            font-size: var(--type-small);
            margin: 0;
            cursor: pointer;
            font-family: var(--font-display);
            text-transform: none;
            letter-spacing: normal;
        }

        /* ── Main Content ── */
        .content {
            flex: 1;
        }

        .controls {
            padding-bottom: 1.5rem;
        }

        .controls h2 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: var(--type-h2);
            color: var(--cs-charcoal);
            border-bottom: 2px solid var(--cs-red);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .control-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-family: var(--font-serif);
            font-size: var(--type-eyebrow);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--cs-charcoal);
            margin-bottom: 0.5rem;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .stats {
            font-family: var(--font-display);
            font-size: var(--type-small);
            color: var(--cs-mid-grey);
            margin-top: 1rem;
        }

        /* ── Rules Grid ── */
        .rules-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
            margin-bottom: 3rem;
        }

        /* ── Rule Card ── */
        .rule-card {
            background: var(--cs-white);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            border-left: 4px solid var(--cs-red);
            transition: background 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .rule-card:hover {
            background: rgba(232, 42, 55, 0.06);
        }

        .rule-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .rule-title {
            font-family: var(--font-display);
            font-size: var(--type-h2);
            font-weight: 700;
            color: var(--cs-charcoal);
            line-height: 1.3;
            flex: 1;
        }

        .rule-meta {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        /* ── Severity Badges ── */
        .badge {
            font-family: var(--font-display);
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 3px 8px;
            border-radius: 2px;
            color: var(--cs-white);
            white-space: nowrap;
        }

        .badge--critical {
            background: var(--cs-red);
        }

        .badge--warning {
            background: var(--cs-gold);
            color: var(--cs-charcoal);
        }

        .badge--active {
            background: var(--cs-teal);
        }

        .badge--info {
            background: var(--cs-blue);
        }

        .badge-type {
            background: var(--cs-charcoal);
        }

        .rule-description {
            font-family: var(--font-display);
            font-size: var(--type-body);
            color: #4A4A4A;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .rule-expression {
            background: #F0F0F0;
            border-left: 3px solid var(--cs-blue);
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 2px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.8rem;
            color: #333;
            overflow-x: auto;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .rule-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-display);
            font-size: var(--type-small);
            color: var(--cs-mid-grey);
            border-top: 1px solid rgba(168, 178, 185, 0.25);
            padding-top: 0.75rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .rule-reference {
            display: inline-block;
        }

        .rule-reference a {
            color: var(--cs-blue);
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
        }

        .rule-reference a:hover {
            text-decoration: underline;
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--cs-white);
            border-radius: var(--card-radius);
            border-left: 4px solid var(--cs-mid-grey);
            color: var(--cs-mid-grey);
            font-family: var(--font-display);
            font-size: var(--type-body);
        }

        /* ── Load More Button ── */
        .load-more-container {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        .load-more-btn {
            background: var(--cs-red);
            color: var(--cs-white);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: var(--card-radius);
            font-family: var(--font-display);
            font-size: var(--type-body);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .load-more-btn:hover {
            background: var(--cs-dark-red);
        }

        .load-more-btn:disabled {
            background: var(--cs-mid-grey);
            cursor: not-allowed;
        }

        /* ── Footer ── */
        footer {
            background: var(--cs-charcoal);
            color: var(--cs-mid-grey);
            padding: 1.5rem 4rem;
            font-family: var(--font-display);
            font-size: 0.75rem;
            text-align: center;
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                grid-column: 1;
            }
        }

        @media (max-width: 768px) {
            .cover {
                padding: 2rem 1.5rem;
            }
            .cover h1 {
                font-size: 1.75rem;
            }
            .main-content {
                padding: 1.5rem;
            }
            .filter-row {
                grid-template-columns: 1fr;
            }
            footer {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="cover">
        <div class="cover__top">
            <span class="cover__brand">CyberSift</span>
            <span class="cover__date">JMESPath Rules Catalog</span>
        </div>
        <div class="cover__content">
            <h1>JMESPath Rules Catalog</h1>
            <p class="cover__sub">Filterable detection and filtering rules</p>
        </div>
        <div class="cover__footer">Part of <strong>GO plc.</strong> Group</div>
    </header>

    <div class="main-content">
        <!-- Sidebar Filters -->
        <aside class="sidebar">
            <h3>Filters</h3>

            <div class="filter-group">
                <label class="filter-label">Log Source</label>
                <div class="filter-options" id="source-filters"></div>
            </div>

            <div class="filter-group">
                <label class="filter-label">Severity</label>
                <select id="severity">
                    <option value="">All Severities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                    <option value="info">Info</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Rule Type</label>
                <select id="type">
                    <option value="">All Types</option>
                    <option value="detection">Detection</option>
                    <option value="filtering">Filtering</option>
                </select>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="content">
            <div class="controls">
                <h2>Search &amp; Filter</h2>
                <div class="filter-row">
                    <div class="control-group">
                        <label for="search">Search Rules</label>
                        <input type="text" id="search" placeholder="Search by name, description...">
                    </div>
                </div>
                <div class="stats">
                    Showing <strong id="displayed-count">0</strong> of <strong id="total-count">0</strong> rules
                </div>
            </div>

            <div class="rules-grid" id="rules-container"></div>

            <div class="load-more-container" id="load-more-container" style="display: none;">
                <button class="load-more-btn" id="load-more-btn">Load More Rules</button>
            </div>
        </div>
    </div>

    <script>
        const RULES_PER_PAGE = 100;
        let allRules = [];
        let filteredRules = [];
        let displayedRules = [];
        let currentPage = 0;
        let availableSources = new Set();

        async function loadRules() {
            try {
                const response = await fetch('./rules.json');
                allRules = await response.json();
                
                // Extract unique log sources from rule type
                allRules.forEach(rule => {
                    if (rule.type && rule.type !== 'detection' && rule.type !== 'filtering') {
                        availableSources.add(rule.type);
                    }
                });

                buildSourceFilters();
                currentPage = 0;
                filterRules();
                setupFilters();
            } catch (error) {
                console.error('Error loading rules:', error);
                document.getElementById('rules-container').innerHTML = '<div class="empty-state"><p>Error loading rules</p></div>';
            }
        }

        function buildSourceFilters() {
            const container = document.getElementById('source-filters');
            const sources = Array.from(availableSources).sort();

            container.innerHTML = sources.map(source => `
                <div class="filter-checkbox">
                    <input type="checkbox" id="source-${source}" value="${source}" class="source-filter">
                    <label for="source-${source}">${escapeHtml(source.charAt(0).toUpperCase() + source.slice(1))}</label>
                </div>
            `).join('');

            // Add event listeners to all source checkboxes
            document.querySelectorAll('.source-filter').forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    currentPage = 0;
                    filterRules();
                });
            });
        }

        function setupFilters() {
            document.getElementById('search').addEventListener('input', () => {
                currentPage = 0;
                filterRules();
            });
            document.getElementById('severity').addEventListener('change', () => {
                currentPage = 0;
                filterRules();
            });
            document.getElementById('type').addEventListener('change', () => {
                currentPage = 0;
                filterRules();
            });
            document.getElementById('load-more-btn').addEventListener('click', loadMore);
        }

        function filterRules() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const severity = document.getElementById('severity').value;
            const ruleType = document.getElementById('type').value;
            
            // Get selected sources
            const selectedSources = Array.from(document.querySelectorAll('.source-filter:checked'))
                .map(checkbox => checkbox.value);

            filteredRules = allRules.filter(rule => {
                const matchesSearch = !searchTerm || 
                    rule.name.toLowerCase().includes(searchTerm) || 
                    (rule.description && rule.description.toLowerCase().includes(searchTerm)) ||
                    (rule.type && rule.type.toLowerCase().includes(searchTerm));
                
                const matchesSeverity = !severity || rule.severity === severity;
                const matchesType = !ruleType || rule.type === ruleType || (ruleType === 'detection' && rule.type !== 'filtering') || (ruleType === 'filtering' && rule.type === 'filtering');
                
                // If no sources selected, include all; otherwise only include selected sources
                const matchesSource = selectedSources.length === 0 || selectedSources.includes(rule.type);

                return matchesSearch && matchesSeverity && matchesType && matchesSource;
            });

            // Reset to first page
            displayedRules = [];
            loadMore();
        }

        function loadMore() {
            const startIdx = currentPage * RULES_PER_PAGE;
            const endIdx = startIdx + RULES_PER_PAGE;
            const newRules = filteredRules.slice(startIdx, endIdx);
            
            displayedRules.push(...newRules);
            currentPage++;
            
            renderRules();
            updateLoadMoreButton();
        }

        function renderRules() {
            const container = document.getElementById('rules-container');
            document.getElementById('displayed-count').textContent = displayedRules.length;
            document.getElementById('total-count').textContent = filteredRules.length;

            if (displayedRules.length === 0 && filteredRules.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No rules match your filters</p></div>';
                return;
            }

            container.innerHTML = displayedRules.map(rule => {
                let badgeClass = 'badge--info';
                if (rule.severity === 'high') badgeClass = 'badge--critical';
                else if (rule.severity === 'medium') badgeClass = 'badge--warning';
                else if (rule.severity === 'low') badgeClass = 'badge--active';

                const referenceLink = rule.reference ? 
                    `<span class="rule-reference"><a href="${escapeHtml(rule.reference)}" target="_blank" rel="noopener noreferrer">📖 View Reference</a></span>` : 
                    '';

                return `
                <div class="rule-card">
                    <div class="rule-header">
                        <div>
                            <div class="rule-title">${escapeHtml(rule.name)}</div>
                            <div class="rule-meta">
                                <span class="badge ${badgeClass}">${rule.severity.toUpperCase()}</span>
                                <span class="badge badge-type">${escapeHtml(rule.type.toUpperCase())}</span>
                            </div>
                        </div>
                    </div>
                    <div class="rule-description">${escapeHtml(rule.description || 'No description')}</div>
                    ${rule.expression ? `<div class="rule-expression">${escapeHtml(rule.expression)}</div>` : ''}
                    <div class="rule-footer">
                        <span>v${escapeHtml(rule.version || '1.0')}</span>
                        ${referenceLink}
                    </div>
                </div>
            `}).join('');
        }

        function updateLoadMoreButton() {
            const btn = document.getElementById('load-more-btn');
            const container = document.getElementById('load-more-container');
            
            if (displayedRules.length < filteredRules.length) {
                container.style.display = 'flex';
                btn.disabled = false;
                btn.textContent = `Load More Rules (${filteredRules.length - displayedRules.length} remaining)`;
            } else {
                container.style.display = 'none';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', loadRules);
    </script>
</body>
</html>
